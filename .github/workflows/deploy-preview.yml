name: Vercel Preview Deployment

on:
  push:
    branches-ignore:
      - main

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    environment: preview
    env:
      MAIL_USER: ${{ secrets.MAIL_USER }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      MAIL_PASS: ${{ secrets.MAIL_PASS }}
      MAIL_PORT: ${{ vars.MAIL_PORT }}
      MAIL_HOST: ${{ secrets.MAIL_HOST }}
      DATABASE_CON_URL: ${{ secrets.DATABASE_CON_URL }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel Environment Information
        run: npx --yes vercel pull --yes --environment=preview  --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build application
        run: npx --yes vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Preview
        run: npx --yes vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
